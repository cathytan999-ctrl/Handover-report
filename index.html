<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CInspect Delete Debug Ready</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,Helvetica,sans-serif;padding:16px;background:#f7f7f7}
.wrap{max-width:760px;margin:0 auto}
input,button,textarea{width:100%;margin:8px 0;padding:14px;border:1px solid #ccc;border-radius:12px;box-sizing:border-box;font-size:16px}
button{background:#1d4ed8;color:#fff;font-weight:700;cursor:pointer}
button.secondary{background:#475569}
button.ghost{background:#fff;color:#0f172a}
.card{background:#fff;border:1px solid #ddd;padding:14px;border-radius:16px;margin-bottom:16px}
#status{white-space:pre-wrap;font-size:15px;line-height:1.4;padding:12px;border-radius:12px;border:1px solid #ddd;background:#fff;position:sticky;top:8px;z-index:20}
.ok{color:#166534;border-color:#86efac;background:#f0fdf4}
.err{color:#b91c1c;border-color:#fecaca;background:#fef2f2}
.muted{color:#64748b}
.report{border:1px solid #ddd;border-radius:12px;padding:12px;margin-top:10px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap}
.toolbar button{width:auto;min-width:120px}
</style>
</head>
<body>
<div class="wrap">
  <div id="status" class="muted">Ready.</div>

  <div class="card">
    <h2>CInspect Delete Debug Ready</h2>
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <div class="toolbar">
      <button id="signupBtn">Sign Up</button>
      <button id="signinBtn" class="secondary">Sign In</button>
      <button id="checkBtn" class="ghost">Check Login</button>
      <button id="signoutBtn" class="ghost">Sign Out</button>
    </div>
  </div>

  <div class="card">
    <h3>Report</h3>
    <input id="address" placeholder="Property Address">
    <textarea id="notes" placeholder="Notes"></textarea>
    <div class="toolbar">
      <button id="saveBtn">Save Report</button>
      <button id="loadBtn" class="secondary">Load My Reports</button>
    </div>
  </div>

  <div class="card">
    <h3>My Reports</h3>
    <div id="reportList"></div>
  </div>
</div>

<script>
const supabase = window.supabase.createClient("https://biwojmcftldaxytrrpiy.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpd29qbWNmdGxkYXh5dHJycGl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTkyNDUsImV4cCI6MjA5MTg5NTI0NX0.F0n-9YyPgrEfwbcuLODOQpzsDQobyrBFByC9dnvP5uw");

function setStatus(msg, cls='muted') {
  const el = document.getElementById('status');
  el.className = cls;
  el.textContent = msg;
}

window.addEventListener('error', (e) => {
  setStatus("Page error: " + e.message, "err");
  alert("Page error: " + e.message);
});

async function checkLogin() {
  try {
    const { data, error } = await supabase.auth.getUser();
    if (error) throw error;
    if (data.user) {
      setStatus("Logged in as " + (data.user.email || "user"), "ok");
      alert("Logged in as " + (data.user.email || "user"));
    } else {
      setStatus("Not logged in.", "err");
      alert("Not logged in.");
    }
  } catch (err) {
    setStatus("Check login failed: " + err.message, "err");
    alert("Check login failed: " + err.message);
  }
}

async function signUp() {
  try {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    if (!email || !password) throw new Error("Enter email and password.");
    setStatus("Signing up...");
    const { error } = await supabase.auth.signUp({ email, password });
    if (error) throw error;
    setStatus("Signed up successfully. Then tap Sign In.", "ok");
    alert("Signed up successfully. Then tap Sign In.");
  } catch (err) {
    setStatus("Sign up failed: " + err.message, "err");
    alert("Sign up failed: " + err.message);
  }
}

async function signIn() {
  try {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    if (!email || !password) throw new Error("Enter email and password.");
    setStatus("Signing in...");
    const { error, data } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    setStatus("Logged in as " + (data.user?.email || email), "ok");
    alert("Logged in as " + (data.user?.email || email));
  } catch (err) {
    setStatus("Sign in failed: " + err.message, "err");
    alert("Sign in failed: " + err.message);
  }
}

async function signOut() {
  try {
    await supabase.auth.signOut();
    setStatus("Signed out.", "ok");
    alert("Signed out.");
  } catch (err) {
    setStatus("Sign out failed: " + err.message, "err");
    alert("Sign out failed: " + err.message);
  }
}

async function saveReport() {
  try {
    const { data, error: userErr } = await supabase.auth.getUser();
    if (userErr) throw userErr;
    if (!data.user) throw new Error("Login first.");
    const address = document.getElementById("address").value.trim();
    const notes = document.getElementById("notes").value.trim();
    if (!address) throw new Error("Enter property address.");
    setStatus("Saving...");
    const { error } = await supabase.from("reports").insert([{ user_id: data.user.id, address, notes }]);
    if (error) throw error;
    setStatus("Saved successfully.", "ok");
    alert("Saved successfully.");
  } catch (err) {
    setStatus("Save failed: " + err.message, "err");
    alert("Save failed: " + err.message);
  }
}

async function loadReports() {
  try {
    const { data, error: userErr } = await supabase.auth.getUser();
    if (userErr) throw userErr;
    if (!data.user) throw new Error("Login first.");
    setStatus("Loading reports...");
    const { data: rows, error } = await supabase.from("reports").select("*").order("created_at", { ascending: false });
    if (error) throw error;
    const reportList = document.getElementById("reportList");
    reportList.innerHTML = "";
    (rows || []).forEach(r => {
      const div = document.createElement("div");
      div.className = "report";
      div.innerHTML = "<b>" + (r.address || "") + "</b><br>" + (r.notes || "");
      const btn = document.createElement("button");
      btn.textContent = "Delete";
      btn.className = "ghost";
      btn.onclick = () => deleteReport(r.id);
      div.appendChild(document.createElement("br"));
      div.appendChild(document.createElement("br"));
      div.appendChild(btn);
      reportList.appendChild(div);
    });
    setStatus("Loaded " + (rows || []).length + " report(s).", "ok");
  } catch (err) {
    setStatus("Load failed: " + err.message, "err");
    alert("Load failed: " + err.message);
  }
}

async function deleteReport(id) {
  try {
    if (!confirm("Delete this report?")) return;
    setStatus("Deleting...");
    const { error } = await supabase.from("reports").delete().eq("id", id);
    if (error) throw error;
    setStatus("Deleted successfully.", "ok");
    alert("Deleted successfully.");
    loadReports();
  } catch (err) {
    setStatus("Delete failed: " + err.message, "err");
    alert("Delete failed: " + err.message);
  }
}

document.getElementById("signupBtn").addEventListener("click", signUp);
document.getElementById("signinBtn").addEventListener("click", signIn);
document.getElementById("checkBtn").addEventListener("click", checkLogin);
document.getElementById("signoutBtn").addEventListener("click", signOut);
document.getElementById("saveBtn").addEventListener("click", saveReport);
document.getElementById("loadBtn").addEventListener("click", loadReports);

checkLogin();
</script>
</body>
</html>
