<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CInspect V11 Basic Debug</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,Helvetica,sans-serif;padding:20px;background:#f7f7f7}
.wrap{max-width:720px;margin:0 auto}
input,button,textarea{width:100%;margin:6px 0;padding:12px;border:1px solid #ccc;border-radius:10px;box-sizing:border-box}
button{background:#1d4ed8;color:#fff;font-weight:700;cursor:pointer}
button.secondary{background:#475569}
.card{background:#fff;border:1px solid #ddd;padding:14px;border-radius:14px;margin-bottom:14px}
#status{white-space:pre-wrap;font-size:14px;line-height:1.4}
.ok{color:#166534}.err{color:#b91c1c}.muted{color:#64748b}
</style>
</head>
<body>
<div class="wrap">
  <h2>CInspect V11 Basic Debug</h2>

  <div class="card">
    <h3>Login</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="signupBtn">Sign Up</button>
    <button id="signinBtn" class="secondary">Sign In</button>
  </div>

  <div class="card">
    <h3>Report</h3>
    <input id="address" placeholder="Property Address">
    <textarea id="notes" placeholder="Notes"></textarea>
    <button id="saveBtn">Save Report</button>
    <button id="loadBtn" class="secondary">Load My Reports</button>
  </div>

  <div class="card">
    <h3>Status</h3>
    <div id="status" class="muted">Ready.</div>
  </div>

  <div class="card">
    <h3>My Reports</h3>
    <div id="list"></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://biwojmcftldaxytrrpiy.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpd29qbWNmdGxkYXh5dHJycGl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTkyNDUsImV4cCI6MjA5MTg5NTI0NX0.F0n-9YyPgrEfwbcuLODOQpzsDQobyrBFByC9dnvP5uw";

let sb = null;

function setStatus(msg, cls='muted'){
  const el = document.getElementById('status');
  el.className = cls;
  el.textContent = msg;
}

function ensureClient(){
  if (!window.supabase || !window.supabase.createClient) {
    throw new Error("Supabase library did not load.");
  }
  if (!sb) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  }
  return sb;
}

async function signUp(){
  try{
    const client = ensureClient();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) throw new Error("Enter email and password.");
    setStatus("Signing up...");
    const { data, error } = await client.auth.signUp({ email, password });
    if (error) throw error;
    setStatus("Signed up. If email confirmation is disabled, you can sign in now.", "ok");
  }catch(err){
    setStatus("Sign up failed: " + err.message, "err");
  }
}

async function signIn(){
  try{
    const client = ensureClient();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) throw new Error("Enter email and password.");
    setStatus("Signing in...");
    const { data, error } = await client.auth.signInWithPassword({ email, password });
    if (error) throw error;
    setStatus("Logged in as " + (data.user?.email || email), "ok");
  }catch(err){
    setStatus("Sign in failed: " + err.message, "err");
  }
}

async function saveReport(){
  try{
    const client = ensureClient();
    const { data: userData, error: userErr } = await client.auth.getUser();
    if (userErr) throw userErr;
    const user = userData.user;
    if (!user) throw new Error("Login first.");
    const address = document.getElementById('address').value.trim();
    const notes = document.getElementById('notes').value.trim();
    if (!address) throw new Error("Enter a property address.");
    setStatus("Saving report...");
    const { error } = await client.from("reports").insert({
      user_id: user.id,
      address,
      notes
    });
    if (error) throw error;
    setStatus("Saved report successfully.", "ok");
  }catch(err){
    setStatus("Save failed: " + err.message, "err");
  }
}

async function loadReports(){
  try{
    const client = ensureClient();
    const { data: userData, error: userErr } = await client.auth.getUser();
    if (userErr) throw userErr;
    const user = userData.user;
    if (!user) throw new Error("Login first.");
    setStatus("Loading reports...");
    const { data, error } = await client
      .from("reports")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending:false });
    if (error) throw error;
    const list = document.getElementById('list');
    list.innerHTML = "";
    if (!data || !data.length){
      list.innerHTML = "<div class='muted'>No reports found.</div>";
      setStatus("Loaded. No reports yet.", "ok");
      return;
    }
    data.forEach(r => {
      const div = document.createElement('div');
      div.className = "card";
      div.innerHTML = "<b>" + (r.address || "-") + "</b><br>" + (r.notes || "") + "<br><span class='muted'>" + (r.created_at || "") + "</span>";
      list.appendChild(div);
    });
    setStatus("Loaded " + data.length + " report(s).", "ok");
  }catch(err){
    setStatus("Load failed: " + err.message, "err");
  }
}

window.addEventListener('error', (e) => {
  setStatus("Page error: " + e.message, "err");
});

document.getElementById('signupBtn').addEventListener('click', signUp);
document.getElementById('signinBtn').addEventListener('click', signIn);
document.getElementById('saveBtn').addEventListener('click', saveReport);
document.getElementById('loadBtn').addEventListener('click', loadReports);

try{
  ensureClient();
  setStatus("Ready. Supabase client loaded.", "ok");
}catch(err){
  setStatus("Startup error: " + err.message, "err");
}
</script>
</body>
</html>
