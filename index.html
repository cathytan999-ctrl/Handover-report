<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CInspect Login Test</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,Helvetica,sans-serif;padding:16px;background:#f7f7f7}
.wrap{max-width:720px;margin:0 auto}
.card{background:#fff;border:1px solid #ddd;border-radius:16px;padding:16px;margin-bottom:16px}
input,button{width:100%;padding:14px;border:1px solid #ccc;border-radius:12px;box-sizing:border-box;font-size:16px;margin:8px 0}
button{background:#1d4ed8;color:#fff;font-weight:700}
button.secondary{background:#475569}
#status{white-space:pre-wrap;padding:12px;border-radius:12px;border:1px solid #ddd;background:#fff;position:sticky;top:8px}
.ok{background:#f0fdf4;color:#166534;border-color:#86efac}
.err{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
.muted{color:#64748b}
.small{font-size:13px;color:#64748b}
</style>
</head>
<body>
<div class="wrap">
  <div id="status" class="muted">Page loaded.</div>
  <div class="card">
    <h2 style="margin-top:0;">CInspect Login Test</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signInNow()">Sign In</button>
    <button class="secondary" onclick="checkNow()">Check Login</button>
    <button class="secondary" onclick="signOutNow()">Sign Out</button>
    <div class="small">If tapping buttons does nothing, the page is cached or an old file is still loading.</div>
  </div>
</div>

<script>
const sb = window.supabase.createClient("https://biwojmcftldaxytrrpiy.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpd29qbWNmdGxkYXh5dHJycGl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMTkyNDUsImV4cCI6MjA5MTg5NTI0NX0.F0n-9YyPgrEfwbcuLODOQpzsDQobyrBFByC9dnvP5uw");

function setStatus(msg, cls='muted'){
  const el = document.getElementById('status');
  el.className = cls;
  el.textContent = msg;
}

window.onerror = function(msg){
  setStatus("Page error: " + msg, "err");
  alert("Page error: " + msg);
};

async function signInNow(){
  try {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) {
      setStatus("Enter both email and password.", "err");
      alert("Enter both email and password.");
      return;
    }
    setStatus("Sign In button clicked. Signing in...", "muted");
    const result = await sb.auth.signInWithPassword({ email, password });
    if (result.error) throw result.error;
    setStatus("Logged in as " + (result.data.user?.email || email), "ok");
    alert("Logged in as " + (result.data.user?.email || email));
  } catch (err) {
    setStatus("Sign in failed: " + err.message, "err");
    alert("Sign in failed: " + err.message);
  }
}

async function checkNow(){
  try {
    setStatus("Checking login...", "muted");
    const result = await sb.auth.getUser();
    if (result.error) throw result.error;
    if (result.data.user) {
      setStatus("Already logged in as " + (result.data.user.email || "user"), "ok");
      alert("Already logged in as " + (result.data.user.email || "user"));
    } else {
      setStatus("Not logged in.", "err");
      alert("Not logged in.");
    }
  } catch (err) {
    setStatus("Check failed: " + err.message, "err");
    alert("Check failed: " + err.message);
  }
}

async function signOutNow(){
  try {
    await sb.auth.signOut();
    setStatus("Signed out.", "ok");
    alert("Signed out.");
  } catch (err) {
    setStatus("Sign out failed: " + err.message, "err");
    alert("Sign out failed: " + err.message);
  }
}

setStatus("Page loaded. Buttons should show alerts.", "ok");
</script>
</body>
</html>
